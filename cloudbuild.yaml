steps:
  # 1. Pull the previous image for caching
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker pull gcr.io/$PROJECT_ID/skyclaw-builder:latest || exit 0']

  # 2. Build the image using cargo-chef cache
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/$PROJECT_ID/skyclaw-builder:latest',
      '--cache-from', 'gcr.io/$PROJECT_ID/skyclaw-builder:latest',
      '.'
    ]

  # 3. Push the image back to registry for future caching
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/skyclaw-builder:latest']

  # 4. Extract the binary from the image
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker create --name extractor gcr.io/$PROJECT_ID/skyclaw-builder:latest
        docker cp extractor:/app/target/aarch64-unknown-linux-gnu/release/skyclaw ./skyclaw
        docker rm extractor

# Save the binary to GCS
artifacts:
  objects:
    location: 'gs://${PROJECT_ID}-skyclaw-builds/${BUILD_ID}'
    paths: ['skyclaw']

options:
  machineType: 'E2_HIGHCPU_8'
