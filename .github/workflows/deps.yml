name: Dependency Check

on:
  schedule:
    # Run every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # -----------------------------------------------
  # Job 1: Security audit with cargo-audit
  # -----------------------------------------------
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.83"

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit --json > audit-results.json 2>&1 || true

      - name: Display audit results
        run: |
          cargo audit 2>&1 || true
          echo ""
          echo "---"

          # Check for vulnerabilities
          if cargo audit 2>&1 | grep -q "Crate:"; then
            echo "::warning::Security vulnerabilities found. Review audit results above."
          else
            echo "No known vulnerabilities found."
          fi

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-audit-results
          path: audit-results.json
          retention-days: 30

  # -----------------------------------------------
  # Job 2: Check for outdated dependencies
  # -----------------------------------------------
  outdated:
    name: Outdated Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.83"

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-outdated
        run: cargo install cargo-outdated --locked

      - name: Check for outdated dependencies
        run: |
          echo "## Workspace Dependency Report" > outdated-report.md
          echo "" >> outdated-report.md
          echo '```' >> outdated-report.md
          cargo outdated --workspace --root-deps-only 2>&1 | tee -a outdated-report.md
          echo '```' >> outdated-report.md

      - name: Upload outdated report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-outdated-report
          path: outdated-report.md
          retention-days: 30

      - name: Summary
        run: |
          OUTDATED_COUNT=$(cargo outdated --workspace --root-deps-only 2>&1 | grep -c "^[a-z]" || true)
          echo "### Dependency Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Outdated root dependencies:** ${OUTDATED_COUNT}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See artifacts for full report." >> $GITHUB_STEP_SUMMARY

  # -----------------------------------------------
  # Job 3: Check Rust toolchain updates
  # -----------------------------------------------
  toolchain:
    name: Toolchain Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check latest stable Rust version
        run: |
          CURRENT_MSRV=$(grep 'rust-version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          LATEST=$(curl -s https://static.rust-lang.org/dist/channel-rust-stable.toml | grep -m1 'version =' | sed 's/.*"\(.*\)"/\1/' | cut -d' ' -f1)

          echo "### Rust Toolchain" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **MSRV (Cargo.toml):** ${CURRENT_MSRV}" >> $GITHUB_STEP_SUMMARY
          echo "- **CI toolchain:** 1.83" >> $GITHUB_STEP_SUMMARY
          echo "- **Latest stable:** ${LATEST}" >> $GITHUB_STEP_SUMMARY

          if [ "${LATEST}" != "1.83" ] && [ -n "${LATEST}" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> Consider updating CI toolchain to ${LATEST}" >> $GITHUB_STEP_SUMMARY
          fi
